name: Sync safety data

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  sync-safety:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install requests --break-system-packages

      - name: Fetch and cache Smartraveller data
        run: |
          python3 << 'PYEOF'
          import json, sys, datetime, os, time
          import requests

          URL = "https://www.smartraveller.gov.au/destinations-export"

          HEADERS = {
              "User-Agent": "Mozilla/5.0",
              "Accept": "application/json",
          }

          data = None
          last_error = None

          for attempt in range(1, 4):
              try:
                  print(f"Attempt {attempt}…")
                  # Force HTTP/1.1 to avoid HTTP/2 stream errors (exit code 92)
                  resp = requests.get(URL, headers=HEADERS, timeout=(10, 60))
                  print(f"  Status: {resp.status_code}  Size: {len(resp.content)} bytes")
                  print(f"  First 200 chars: {resp.text[:200]}")

                  if resp.status_code != 200:
                      last_error = f"HTTP {resp.status_code}"
                      time.sleep(5 * attempt)
                      continue

                  data = resp.json()
                  break

              except requests.exceptions.JSONDecodeError as e:
                  print(f"  JSON decode failed: {e}")
                  last_error = str(e)
                  time.sleep(5)
              except Exception as e:
                  print(f"  Request failed: {e}")
                  last_error = str(e)
                  time.sleep(5)

          if data is None:
              print(f"All attempts failed. Last error: {last_error}")
              print("Skipping cache update — existing cache retained.")
              sys.exit(1)

          if not isinstance(data, list):
              print(f"Unexpected response type: {type(data)} — expected list.")
              print("Skipping cache update.")
              sys.exit(1)

          print(f"Parsed {len(data)} entries")

          cache = {}
          for entry in data:
              name = entry.get('name')
              if name:
                  cache[name] = entry
          cache['_fetched_at'] = datetime.datetime.utcnow().isoformat() + 'Z'
          cache['_count'] = len(cache) - 1

          candidates = [
              'data/safety-cache.json',
              'travel-guides/data/safety-cache.json',
          ]
          target = None
          for p in candidates:
              if os.path.isdir(os.path.dirname(p)):
                  target = p
                  break

          if not target:
              print(f"Could not find data/ folder. Dirs: {os.listdir('.')}")
              sys.exit(1)

          with open(target, 'w') as f:
              json.dump(cache, f, indent=2)
          print(f"Wrote {cache['_count']} countries to {target}")
          PYEOF

      - name: Commit updated cache
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A 
          if git diff --staged --quiet; then
            echo "No changes — cache is up to date."
          else
            git commit -m "chore: update safety cache [skip ci]"
            git push
            echo "Cache updated and pushed."
          fi