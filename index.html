<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stylised Route Map (Clean Joins)</title>
  <style>
    body { font-family: Arial, sans-serif; margin:0; padding:0px; text-align:center; }

    .controls { margin: 16px; }
    label { margin: 0 10px; cursor: pointer; }

    .map-container { position: relative; display:inline-block; max-width:100%; }
    .map-container img { width:100%; display:block; }

    svg { position:absolute; top:0; left:0; width:100%; height:100%; }

    .label { font-size:0.7vw; fill:#222; }

    /* ── Side panel ── */
    #info-panel {
      position: fixed;
      top: 0; right: 0;
      width: 300px;
      height: 100vh;
      background: #fff;
      border-left: 1px solid #ddd;
      overflow-y: auto;
      transform: translateX(100%);
      transition: transform 0.22s ease;
      z-index: 100;
      text-align: left;
    }
    #info-panel.open { transform: translateX(0); }

    #panel-header {
      padding: 16px 14px 12px;
      border-bottom: 1px solid #eee;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      position: sticky;
      top: 0;
      background: #fff;
      z-index: 2;
    }
    #panel-title { font-size: 17px; font-weight: 700; color: #111; line-height: 1.2; }
    #panel-subtitle { font-size: 12px; color: #888; margin-top: 2px; }
    #panel-close {
      background: none; border: none; color: #aaa;
      font-size: 20px; cursor: pointer; line-height: 1;
      padding: 2px 4px; flex-shrink: 0;
    }
    #panel-close:hover { color: #333; }

    #panel-body { padding: 12px 14px 24px; display: flex; flex-direction: column; gap: 10px; }

    .info-card {
      background: #f8f8f8;
      border: 1px solid #e8e8e8;
      border-radius: 8px;
      padding: 12px 13px;
    }
    .info-card-label {
      font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: #999; margin-bottom: 7px;
    }
    .info-card p { font-size: 12px; color: #555; line-height: 1.5; margin-top: 4px; }
    .info-card a { font-size: 11px; color: #2a6496; display: block; margin-top: 5px; }

    /* weather */
    .weather-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; margin-top: 4px;
    }
    .weather-month {
      background: #fff; border: 1px solid #e8e8e8;
      border-radius: 6px; padding: 6px 3px; text-align: center;
    }
    .wm-name { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; color: #999; margin-bottom: 2px; }
    .wm-hi   { font-size: 14px; font-weight: 600; color: #222; line-height: 1; }
    .wm-lo   { font-size: 10px; color: #888; margin-top: 2px; }
    .wm-rain { font-size: 10px; color: #5a9fcf; margin-top: 2px; }

    /* badges */
    .badge {
      display: inline-block; font-size: 12px; font-weight: 600;
      padding: 3px 9px; border-radius: 20px; margin-bottom: 4px;
    }
    .badge-safe    { background: #e8f4ed; color: #1a5c32; }
    .badge-caution { background: #fef8e7; color: #7a5a00; }
    .badge-danger  { background: #fdeeed; color: #7a1010; }

    /* cost of living */
    .cost-row {
      display: flex; justify-content: space-between; align-items: baseline;
      padding: 5px 0; border-bottom: 1px solid #eee; font-size: 12px;
    }
    .cost-row:last-child { border-bottom: none; }
    .cost-label { color: #555; }
    .cost-value { font-weight: 600; color: #222; }

    /* shimmer */
    .shimmer {
      background: linear-gradient(90deg, #eee 25%, #ddd 50%, #eee 75%);
      background-size: 200% 100%;
      animation: sh 1.4s infinite;
      border-radius: 4px; height: 12px; margin: 4px 0;
    }
    @keyframes sh { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    #panel-backdrop {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.2); z-index: 99;
    }
    #panel-backdrop.open { display: block; }
  </style>
</head>

    // ── Original path geometry (UNCHANGED) ──────────────────────
    function buildSegment(p1, p2, startMode = null, endMode = null) {
      const dx = p2.x - p1.x, dy = p2.y - p1.y;
      const adx = Math.abs(dx), ady = Math.abs(dy);
      const signX = Math.sign(dx), signY = Math.sign(dy);

      if (adx === 0 || ady === 0 || adx === ady) return [p1, p2];

      function diagFrom(p, d) { return { x: p.x + signX * d, y: p.y + signY * d }; }
      function horizTo(p, x)  { return { x: x, y: p.y }; }
      function vertTo(p, y)   { return { x: p.x, y: y }; }

      if (!startMode && !endMode) return [p1, { x: p2.x, y: p1.y }, p2];

      if (startMode && !endMode) {
        if (startMode === "horizontal") return [p1, horizTo(p1, p2.x), p2];
        if (startMode === "vertical")   return [p1, vertTo(p1, p2.y), p2];
        if (startMode === "diagonal")   { const d = Math.min(adx,ady); return [p1, diagFrom(p1,d), p2]; }
      }

      if (!startMode && endMode) {
        if (endMode === "horizontal") return [p1, { x: p1.x, y: p2.y }, p2];
        if (endMode === "vertical")   return [p1, { x: p2.x, y: p1.y }, p2];
        if (endMode === "diagonal")   { const d = Math.min(adx,ady); return [p1, { x: p2.x-signX*d, y: p2.y-signY*d }, p2]; }
      }

      const d = Math.min(adx, ady);
      if (startMode === "diagonal" && endMode === "diagonal") return [p1, diagFrom(p1, d), p2];

      let mid1, mid2;
      if      (startMode === "horizontal") mid1 = horizTo(p1, p1.x + signX * 1);
      else if (startMode === "vertical")   mid1 = vertTo(p1, p1.y + signY * 1);
      else                                 mid1 = diagFrom(p1, d);

      if      (endMode === "horizontal") mid2 = { x: p2.x - signX * d, y: p2.y };
      else if (endMode === "vertical")   mid2 = { x: p2.x, y: p2.y - signY * d };
      else                               mid2 = { x: p2.x - signX * d, y: p2.y - signY * d };

      return [p1, mid1, mid2, p2];
    }

    function roundedPath(points, radius) {
      if (points.length < 2) return "";
      let d = `M ${points[0].x} ${points[0].y}`;
      for (let i = 1; i < points.length - 1; i++) {
        const p0 = points[i-1], p1 = points[i], p2 = points[i+1];
        const dx1 = p1.x-p0.x, dy1 = p1.y-p0.y;
        const dx2 = p2.x-p1.x, dy2 = p2.y-p1.y;
        const len1 = Math.hypot(dx1,dy1), len2 = Math.hypot(dx2,dy2);
        const r = Math.min(radius, len1/2, len2/2);
        const p1a = { x: p1.x-(dx1/len1)*r, y: p1.y-(dy1/len1)*r };
        const p1b = { x: p1.x+(dx2/len2)*r, y: p1.y+(dy2/len2)*r };
        d += ` L ${p1a.x} ${p1a.y} Q ${p1.x} ${p1.y} ${p1b.x} ${p1b.y}`;
      }
      d += ` L ${points[points.length-1].x} ${points[points.length-1].y}`;
      return d;
    }

    function getLabelOffset(pos) {
      const viewWidth = window.innerWidth;
      const offset = (viewWidth / 100) + 1;
      switch (pos) {
        case "above": return { dx: 0,       dy: -offset,       anchor: "middle" };
        case "below": return { dx: 0,       dy: offset * 1.5,  anchor: "middle" };
        case "left":  return { dx: -offset, dy: 4,             anchor: "end" };
        default:      return { dx:  offset, dy: 4,             anchor: "start" };
      }
    }

    // ── Draw routes + attach click handlers ──────────────────────
    function drawRoutes() {
      const svg = document.getElementById("overlay");
      svg.innerHTML = "";

      const map = document.getElementById("mapImage");
      const width = map.clientWidth;
      const height = map.clientHeight;
      const showLabels = document.getElementById("toggleLabels").checked;

      routes.forEach(route => {
        const visible = document.getElementById(route.toggleId).checked;
        if (!visible) return;

        // Draw path segments
        for (let i = 0; i < route.points.length - 1; i++) {
          const raw1 = route.points[i], raw2 = route.points[i+1];
          const p1 = { x: raw1.x * width / 100, y: raw1.y * height / 100 };
          const p2 = { x: raw2.x * width / 100, y: raw2.y * height / 100 };
          const startMode = route.points[i].startMode || "diagonal";
          const endMode   = route.points[i+1].enterMode || "diagonal";
          const constrained = buildSegment(p1, p2, startMode, endMode);

          const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
          path.setAttribute("d", roundedPath(constrained, 6));
          path.setAttribute("stroke", route.color);
          path.setAttribute("stroke-width", (width/400) + 3);
          path.setAttribute("fill", "none");
          path.setAttribute("stroke-linecap", "round");
          path.style.pointerEvents = "none";
          svg.appendChild(path);
        }

        // Draw nodes + labels
        route.points.forEach(p => {
          const cx = p.x * width / 100;
          const cy = p.y * height / 100;

          // Visible circle (no pointer events — hit target handles clicks)
          const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
          circle.setAttribute("cx", cx);
          circle.setAttribute("cy", cy);
          circle.setAttribute("r", (width/300) + 2);
          circle.setAttribute("fill", "white");
          circle.setAttribute("stroke", route.color);
          circle.setAttribute("stroke-width", (width/600) + 2);
          circle.style.pointerEvents = "none";
          svg.appendChild(circle);

          if (showLabels) {
            const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
            const offset = getLabelOffset(p.labelPos);
            text.setAttribute("x", cx + offset.dx);
            text.setAttribute("y", cy + offset.dy);
            text.setAttribute("text-anchor", offset.anchor);
            text.setAttribute("class", "label");
            text.textContent = p.label;
            text.style.pointerEvents = "none";
            svg.appendChild(text);
          }

          // Transparent hit target (only for named stops)
          if (p.label && p.label.trim()) {
            const hit = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            hit.setAttribute("cx", cx);
            hit.setAttribute("cy", cy);
            hit.setAttribute("r", Math.max((width/300) + 10, 14));
            hit.setAttribute("fill", "transparent");
            hit.style.cursor = "pointer";
            const stopName = p.label.trim();
            hit.addEventListener("click", () => openPanel(stopName, route.color));
            svg.appendChild(hit);
          }
        });
      });
    }

    // ── Panel open/close ─────────────────────────────────────────
    function openPanel(stopName, routeColor) {
      document.getElementById("panel-title").textContent = stopName;
      const info = STOP_DATA[stopName];
      document.getElementById("panel-subtitle").textContent = info ? info.country : "";

      setCardShimmer("card-climate", "Climate");
      setCardShimmer("card-water",   "Water Safety");
      setCardShimmer("card-safety",  "Travel Safety");
      setCardShimmer("card-cost",    "Cost of Living");

      document.getElementById("info-panel").classList.add("open");
      document.getElementById("panel-backdrop").classList.add("open");

      if (!info) {
        document.getElementById("card-climate").innerHTML = `<div class="info-card-label">Climate</div><p>No data for this stop.</p>`;
        return;
      }

      fetchClimate(info.lat, info.lon);
      renderWater(info.water, info.waterNote);
      fetchSafety(info.country);
      fetchCost(info.country);
    }

    function setCardShimmer(id, label) {
      document.getElementById(id).innerHTML = `
        <div class="info-card-label">${label}</div>
        <div class="shimmer" style="width:60%;margin-bottom:5px"></div>
        <div class="shimmer" style="width:80%"></div>`;
    }

    function closePanel() {
      document.getElementById("info-panel").classList.remove("open");
      document.getElementById("panel-backdrop").classList.remove("open");
    }
    document.getElementById("panel-close").addEventListener("click", closePanel);
    document.getElementById("panel-backdrop").addEventListener("click", closePanel);

    // ── Climate (Open-Meteo) ─────────────────────────────────────
    async function fetchClimate(lat, lon) {
      const card = document.getElementById("card-climate");
      try {
        const url = "https://climate-api.open-meteo.com/v1/climate" +
          "?latitude=" + lat +
          "&longitude=" + lon +
          "&start_date=1991-01-01&end_date=2020-12-31" +
          "&monthly=temperature_2m_max,temperature_2m_min,precipitation_sum" +
          "&models=EC_Earth3P_HR";

        const res  = await fetch(url);
        if (!res.ok) throw new Error("HTTP " + res.status);
        const data = await res.json();
        if (!data.monthly) throw new Error("no monthly field in response");

        const MO   = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
        const hi   = data.monthly.temperature_2m_max;
        const lo   = data.monthly.temperature_2m_min;
        const rain = data.monthly.precipitation_sum;
        const keys = [0, 3, 6, 9];

        const cells = keys.map(i => `
          <div class="weather-month">
            <div class="wm-name">${MO[i]}</div>
            <div class="wm-hi">${Math.round(hi[i])}°</div>
            <div class="wm-lo">${Math.round(lo[i])}° lo</div>
            <div class="wm-rain">${Math.round(rain[i])}mm</div>
          </div>`).join("");

        card.innerHTML = `
          <div class="info-card-label">Climate (30-yr avg)</div>
          <div class="weather-grid">${cells}</div>
          <p style="margin-top:6px;font-size:11px;color:#aaa">Jan / Apr / Jul / Oct · hi / lo / rain</p>`;
      } catch(e) {
        card.innerHTML = `<div class="info-card-label">Climate</div><p>Climate data unavailable.</p>`;
      }
    }

    // ── Water safety ─────────────────────────────────────────────
    function renderWater(status, note) {
      const card = document.getElementById("card-water");
      const bc    = { safe:"badge-safe", caution:"badge-caution", unsafe:"badge-danger" }[status] || "badge-caution";
      const label = { safe:"Safe to drink", caution:"Use bottled water", unsafe:"Not safe" }[status] || "Check locally";
      card.innerHTML = `
        <div class="info-card-label">Water Safety</div>
        <div class="badge ${bc}">${label}</div>
        <p>${note}</p>`;
    }

    // ── Travel safety (Smartraveller) ────────────────────────────
    const SAFETY_BADGE = { 1:"badge-safe", 2:"badge-caution", 3:"badge-danger", 4:"badge-danger" };

    async function fetchSafety(countryName) {
      const card = document.getElementById("card-safety");
      try {
        let country;

        try {
          const r = await fetch("travel-guides/data/safety-cache.json");
          if (r.ok) {
            const cache = await r.json();
            country = cache[countryName];
          }
        } catch(_) {}

        if (!country) {
          const proxy = "https://api.allorigins.win/get?url=" + encodeURIComponent("https://www.smartraveller.gov.au/destinations-export");
          const r     = await fetch(proxy);
          const body  = await r.json();
          const list  = JSON.parse(body.contents);
          country     = list.find(c => c.name === countryName);
        }

        if (!country) throw new Error("not found");

        const level = country.advice_level;
        const bc    = SAFETY_BADGE[level] || "badge-caution";
        card.innerHTML = `
          <div class="info-card-label">Travel Safety (Smartraveller)</div>
          <div class="badge ${bc}">Level ${level}: ${country.advice_text}</div>
          <p>Updated ${country.last_updated}</p>
          <a href="${country.url}" target="_blank" rel="noopener">Full advice →</a>`;
      } catch(_) {
        const slug = countryName.toLowerCase().replace(/ /g, "-");
        card.innerHTML = `
          <div class="info-card-label">Travel Safety</div>
          <div class="badge badge-caution">Check before travel</div>
          <a href="https://www.smartraveller.gov.au/destinations/${slug}" target="_blank" rel="noopener">View Smartraveller →</a>`;
      }
    }

    // ── Cost of living ───────────────────────────────────────────
    async function fetchCost(countryName) {
      const card = document.getElementById("card-cost");
      try {
        const r = await fetch("travel-guides/data/cost-cache.json");
        if (!r.ok) throw new Error("file not found");
        const cache = await r.json();

        // Exact match, then case-insensitive fallback
        let entry = cache[countryName];
        if (!entry) {
          const key = Object.keys(cache).find(k => k.toLowerCase() === countryName.toLowerCase());
          entry = key ? cache[key] : null;
        }
        if (!entry) throw new Error("country not in cache");

        // Render whatever fields are present in the entry
        const FIELD_LABELS = {
          budget_per_day:   "Budget/day",
          midrange_per_day: "Mid-range/day",
          meal_cheap:       "Cheap meal",
          meal_mid:         "Mid meal",
          hostel:           "Hostel/night",
          hotel_mid:        "Hotel/night",
          local_transport:  "Local transport",
          beer:             "Beer",
          coffee:           "Coffee",
          notes:            "Notes"
        };

        const rows = Object.entries(FIELD_LABELS)
          .filter(([key]) => entry[key] !== undefined)
          .map(([key, label]) => `
            <div class="cost-row">
              <span class="cost-label">${label}</span>
              <span class="cost-value">${entry[key]}</span>
            </div>`).join("");

        if (!rows) throw new Error("no recognisable fields");

        card.innerHTML = `<div class="info-card-label">Cost of Living</div>${rows}`;
      } catch(_) {
        card.innerHTML = `
          <div class="info-card-label">Cost of Living</div>
          <p>No cost data for ${countryName} yet.<br>
          Add it to <code>travel-guides/data/cost-cache.json</code>.</p>`;
      }
    }

    window.onload   = drawRoutes;
    window.onresize = drawRoutes;
  </script>
